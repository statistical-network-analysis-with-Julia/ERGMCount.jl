<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="grad-purple" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#b57fe3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9558B2;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="grad-red" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#e65c53;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CB3C33;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="grad-green" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#5cb84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#389826;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="32" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Network graph with weighted edges -->
  <g transform="translate(100, 75)" filter="url(#shadow)">
    <!-- Weighted edges (varying thickness for count values) -->
    <line x1="-45" y1="-30" x2="45" y2="-30" stroke="#4063D8" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <line x1="45" y1="-30" x2="0" y2="30" stroke="#4063D8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="30" x2="-45" y2="-30" stroke="#4063D8" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

    <!-- Edge weight labels -->
    <text x="0" y="-38" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="10" fill="#4063D8">3</text>
    <text x="30" y="6" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="10" fill="#4063D8">1</text>
    <text x="-30" y="6" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="10" fill="#4063D8">5</text>

    <!-- Nodes -->
    <circle cx="-45" cy="-30" r="16" fill="url(#grad-purple)" stroke="#ffffff" stroke-width="2"/>
    <circle cx="45" cy="-30" r="16" fill="url(#grad-red)" stroke="#ffffff" stroke-width="2"/>
    <circle cx="0" cy="30" r="16" fill="url(#grad-green)" stroke="#ffffff" stroke-width="2"/>
  </g>

  <!-- Package name -->
  <g transform="translate(100, 155)" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="16" letter-spacing="0.5">
    <text x="-42" y="0" fill="#9558B2">E</text>
    <text x="-30" y="0" fill="#9558B2">R</text>
    <text x="-17" y="0" fill="#9558B2">G</text>
    <text x="-4" y="0" fill="#9558B2">M</text>
    <text x="12" y="0" fill="#CB3C33">C</text>
    <text x="24" y="0" fill="#CB3C33">o</text>
    <text x="35" y="0" fill="#CB3C33">u</text>
    <text x="46" y="0" fill="#CB3C33">n</text>
    <text x="57" y="0" fill="#CB3C33">t</text>
  </g>
  <text x="100" y="175" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="12" fill="#555555">.jl</text>
</svg>
